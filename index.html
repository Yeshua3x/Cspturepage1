<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página de Captura Profissional</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #6e8efb, #a777e3);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .container {
      max-width: 600px;
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      font-weight: 700;
    }
    p {
      font-size: 1.1rem;
      opacity: 0.9;
      margin-bottom: 1.5rem;
    }
    .form {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    input[type="text"],
    input[type="email"],
    button {
      border: none;
      padding: 0.8rem 1rem;
      border-radius: 8px;
      font-size: 1rem;
    }
    input[type="text"],
    input[type="email"] {
      background: rgba(255, 255, 255, 0.8);
      color: #222;
    }
    button {
      background: #fff;
      color: #6e8efb;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    button:hover {
      background: #f5f5f5;
    }
    .footer {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Chegue Mais Perto do Seu Objetivo</h1>
    <p>
      Deixe seu e‑mail e receba nosso guia gratuito com dicas exclusivas para alcançar melhores resultados.
    </p>

    <form class="form" action="#" method="POST" onsubmit="alert('Obrigado! Seu e-mail foi recebido.'); return false;">
      <input type="text" placeholder="Seu nome" name="nome" required />
      <input type="email" placeholder="Seu e-mail" name="email" required />
      <button type="submit">Quero Receber o Material</button>
    </form>

    <div class="footer">
      © 2026 | Todos os direitos reservados.<br />
      Desenvolvido com HTML, CSS e JavaScript puro.
    </div>
  </div>
</body>
</html>
