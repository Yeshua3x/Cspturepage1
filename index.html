<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página de Captura Profissional</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #6e8efb, #a777e3);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .container {
      max-width: 600px;
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      font-weight: 700;
    }
    p {
      font-size: 1.1rem;
      opacity: 0.9;
      margin-bottom: 1.5rem;
    }
    .form {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    input[type="text"],
    input[type="email"],
    button {
      border: none;
      padding: 0.8rem 1rem;
      border-radius: 8px;
      font-size: 1rem;
    }
    input[type="text"],
    input[type="email"] {
      background: rgba(255, 255, 255, 0.8);
      color: #222;
    }
    button {
      background: #fff;
      color: #6e8efb;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    button:hover {
      background: #f5f5f5;
    }
    .footer {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      opacity: 0.7;
    }
    .success {
      display: none;
      background: rgba(0, 255, 0, 0.2);
      color: #000;
      padding: 0.8rem;
      border-radius: 8px;
      margin-top: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Chegue Mais Perto do Seu Objetivo</h1>
    <p>
      Deixe seu e‑mail e receba nosso guia gratuito com dicas exclusivas para alcançar melhores resultados.
    </p>

    <!-- Formulário sem Netlify Forms, só para EmailJS -->
    <form class="form" id="capturaForm">
      <input type="text" id="nome" placeholder="Seu nome" required />
      <input type="email" id="email" placeholder="Seu e-mail" required />
      <button type="submit">Quero Receber o Material</button>
      <div class="success" id="success">
        Obrigado! Você receberá o material em instantes.
      </div>
    </form>

    <div class="footer">
      © 2026 | Todos os direitos reservados.<br />
      Desenvolvido com HTML, CSS e JavaScript puro.
    </div>
  </div>

  <!-- EmailJS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    (function () {
      // Inicialize o EmailJS com sua conta
      // Substitua SEU_PUBLIC_KEY
      emailjs.init("SEU_PUBLIC_KEY_AQUI");

      const form = document.getElementById("capturaForm");
      const nomeInput = document.getElementById("nome");
      const emailInput = document.getElementById("email");
      const success = document.getElementById("success");

      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        const nome = nomeInput.value.trim();
        const email = emailInput.value.trim();

        if (!nome || !email) {
          alert("Preencha nome e e‑mail.");
          return;
        }

        // Envia o e‑mail para você (ou para o lead) com os dados
        const templateParams = {
          to_email: "rochaeterna12@outlook.com", // seu e‑mail de captura
          lead_nome: nome,
          lead_email: email,
          subject: "Novo lead na página de captura",
          message: `Nome: ${nome}\nEmail: ${email}`,
        };

        try {
          await emailjs.send(
            "service_bj0f6i4",
            
            "SEU_TEMPLATE_ID",
            templateParams
          );

          // Opcional: envia e‑mail também para o lead
          await emailjs.send(
            "service_bj0f6i4",
            "SEU_TEMPLATE_ID_PARA_LEAD",
            {
              to_email: email,
              from_name: "Sua Marca",
              subject: "Bem‑vindo(a) ao guia!",
              message: `Olá ${nome}!\n\nObrigado por se cadastrar. Em breve você receberá o material.`,
            }
          );

          success.style.display = "block";
          form.reset();
        } catch (err) {
          console.error("Erro ao enviar e‑mail:", err);
          alert("Algo deu errado. Tente novamente.");
        }
      });
    })();
  </script>
</body>
</html>
